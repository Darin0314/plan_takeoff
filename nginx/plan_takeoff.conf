server {
    listen 8106;
    server_name localhost;

    root /home/smokeshow/code/plan_takeoff;

    client_max_body_size 200M;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_static on;

    # AI backend proxy
    location ^~ /ai/ {
        proxy_pass http://127.0.0.1:8008/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    # PHP API
    location /api/ {
        try_files $uri /api.php?$query_string;
        add_header Cache-Control "no-store" always;
    }

    location = /api.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/api.php;
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
    }

    # Serve rendered page images
    location /storage/pages/ {
        alias /home/smokeshow/code/plan_takeoff/storage/pages/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /storage/thumbnails/ {
        alias /home/smokeshow/code/plan_takeoff/storage/thumbnails/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React SPA hashed assets
    location /assets/ {
        alias /home/smokeshow/code/plan_takeoff/frontend_dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # React SPA catch-all
    location / {
        root /home/smokeshow/code/plan_takeoff/frontend_dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location ~ /\. { deny all; }
    location ~* \.(env|bak|sql|log)$ { deny all; }
}
